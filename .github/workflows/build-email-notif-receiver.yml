name: Build Notif Receiver and Push to Harbor

on:
  workflow_dispatch:
  
env:
  REGISTRY: harbor.bnov.net
  PROJECT: gmail
  APP_NAME: gmail-project-email-notif-receiver
  FULL_IMAGE: harbor.bnov.net/gmail/gmail-project-email-notif-receiver

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}


      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: ./notif_receiver
          file: ./notif_receiver/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.FULL_IMAGE }}:build-${{ github.run_number }}
            ${{ env.FULL_IMAGE }}:latest