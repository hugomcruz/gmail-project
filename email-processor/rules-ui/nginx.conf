server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Cloud Run and other reverse-proxy platforms inject large headers
    # (trace context, IAP JWTs, forwarded-for chains). Raise the buffer
    # beyond the default 4×8k to avoid "400 Request Header Too Large".
    large_client_header_buffers 4 32k;

    # Proxy all API requests to the email-processor backend
    location /api/ {
        proxy_pass https://mailprocessornizz6mq0-gmail-project-email-processor.functions.fnc.fr-par.scw.cloud/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host              mailprocessornizz6mq0-gmail-project-email-processor.functions.fnc.fr-par.scw.cloud;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Proxy Gmail/notif-receiver requests
    location /gmail/ {
        proxy_pass https://mailprocessornizz6mq0-gmail-project-gmail-notif-receiver.functions.fnc.fr-par.scw.cloud/gmail/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host              mailprocessornizz6mq0-gmail-project-gmail-notif-receiver.functions.fnc.fr-par.scw.cloud;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # SPA fallback – hand all unmatched paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
